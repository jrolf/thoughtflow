# ============================================================================
# ThoughtFlow Ruff Configuration
# ============================================================================
#
# Bug catcher only. No style enforcement, no modernization opinions.
#
# Ruff is used here strictly to catch dead code and likely mistakes.
# It does not enforce formatting, import order, type annotations,
# complexity limits, or any stylistic preference.

target-version = "py39"

exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
    ".mypy_cache",
    ".ruff_cache",
    "site",
]

[lint]
select = [
    "F",      # Pyflakes: unused imports, undefined names, unused variables,
              #           redefined names, unreachable code
]

fixable = ["ALL"]
unfixable = []

dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
"__init__.py" = ["F401"]   # Re-exports are intentional
