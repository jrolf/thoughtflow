# ============================================================================
# ThoughtFlow Ruff Configuration
# https://docs.astral.sh/ruff/
# ============================================================================

# Target Python 3.9+
target-version = "py39"

# Line length matches Black default
line-length = 88

# Exclude common non-source directories
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
    ".mypy_cache",
    ".ruff_cache",
    "site",
]

[lint]
# Enable recommended rule sets
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "PTH",    # flake8-use-pathlib
    "ERA",    # eradicate (commented-out code)
    "PL",     # Pylint
    "RUF",    # Ruff-specific rules
]

# Ignore specific rules
ignore = [
    "E501",    # Line too long (handled by formatter)
    "PLR0913", # Too many arguments
    "PLR2004", # Magic value comparison

    # ------------------------------------------------------------------
    # Whitespace-preservation policy
    #
    # This project uses intentional whitespace for visual alignment
    # (e.g., lining up '=' across related assignments, padding inside
    # brackets, extra blank lines for logical grouping).  All rules
    # whose fix *removes* whitespace are disabled below.  Rules that
    # *add* missing whitespace (E225, E231, etc.) are kept.
    # ------------------------------------------------------------------

    # Extra whitespace around brackets / punctuation
    "E201",    # Whitespace after '('
    "E202",    # Whitespace before ')'
    "E211",    # Whitespace before '(' or '['

    # Extra whitespace around operators
    "E221",    # Multiple spaces before operator
    "E222",    # Multiple spaces after operator
    "E223",    # Tab before operator
    "E224",    # Tab after operator

    # Extra whitespace around commas
    "E241",    # Multiple spaces after comma
    "E242",    # Tab after comma

    # Extra whitespace around keyword / parameter defaults
    "E251",    # Unexpected spaces around keyword / parameter default

    # Extra whitespace around keywords
    "E271",    # Multiple spaces after keyword
    "E272",    # Multiple spaces before keyword
    "E273",    # Whitespace before keyword
    "E274",    # Tab before keyword

    # Blank-line condensing
    "E303",    # Too many blank lines

    # Trailing / incidental whitespace
    "W291",    # Trailing whitespace
    "W293",    # Blank line contains whitespace
    "W391",    # Blank line at end of file
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
# Tests can use assert and have unused arguments (fixtures)
"tests/**/*.py" = ["S101", "ARG001", "PLR2004"]
# __init__.py files often have unused imports for re-exporting
"__init__.py" = ["F401"]

[lint.isort]
known-first-party = ["thoughtflow"]
force-single-line = false
lines-after-imports = 2

[format]
# WARNING: `ruff format` is an opinionated formatter (like Black) that will
# rewrite whitespace and destroy intentional alignment.  It cannot be
# configured to preserve alignment spacing.  If you use `ruff format`,
# protect aligned blocks with  # fmt: off / # fmt: on  directives, or
# avoid running the formatter entirely and rely only on `ruff check`.

# Use double quotes for strings
quote-style = "double"

# Indent with spaces
indent-style = "space"

# Respect magic trailing commas
skip-magic-trailing-comma = false

# Unix-style line endings
line-ending = "lf"

# Format docstrings
docstring-code-format = true
